name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Prevent the scheduled/dispatch build from re-triggering itself via GitLab mirror
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Change detection (scheduled/dispatch runs only) ──────────────────────
      - name: Check WP content for changes
        id: check
        if: github.event_name != 'push'
        env:
          VITE_KYAF_BASE_URL: ${{ secrets.VITE_KYAF_BASE_URL }}
        run: |
          chmod +x scripts/check-wp-modified.sh
          LATEST=$(scripts/check-wp-modified.sh)
          echo "latest_modified=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Restore change-detection cache
        id: cache
        if: github.event_name != 'push' && steps.check.outputs.latest_modified != ''
        uses: actions/cache@v4
        with:
          path: .wp-modified-sentinel
          key: wp-modified-${{ steps.check.outputs.latest_modified }}

      - name: Skip if content unchanged
        if: github.event_name != 'push' && steps.cache.outputs.cache-hit == 'true'
        run: |
          echo "No WP changes detected, skipping build."
          echo "SKIP_BUILD=true" >> "$GITHUB_ENV"

      # ── Build & deploy ───────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        if: env.SKIP_BUILD != 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: env.SKIP_BUILD != 'true'
        run: npm ci

      - name: Install Chromium dependencies
        if: env.SKIP_BUILD != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libx11-xcb1 libxcomposite1 libxcursor1 libxdamage1 \
            libxi6 libxtst6 libnss3 libcups2 libxss1 libxrandr2 \
            libasound2t64 libatk1.0-0t64 libpangocairo-1.0-0 \
            libgbm1 libgtk-3-0t64

      - name: Build
        if: env.SKIP_BUILD != 'true'
        run: npm run build
        env:
          VITE_BKKK_BASE_URL: ${{ secrets.VITE_BKKK_BASE_URL }}
          VITE_KYAF_BASE_URL: ${{ secrets.VITE_KYAF_BASE_URL }}

      - name: Update change-detection cache
        if: env.SKIP_BUILD != 'true' && steps.check.outputs.latest_modified != ''
        run: echo "${{ steps.check.outputs.latest_modified }}" > .wp-modified-sentinel

      - name: Deploy to Hostinger
        if: env.SKIP_BUILD != 'true'
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          remote_host: ${{ secrets.HOSTINGER_SSH_HOST }}
          remote_port: ${{ secrets.HOSTINGER_SSH_PORT }}
          remote_user: ${{ secrets.HOSTINGER_SSH_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}

      # Only mirror on direct pushes — not on scheduled/dispatch runs
      # This prevents a push→GitLab→GitHub→push loop
      - name: Mirror to GitLab
        if: env.SKIP_BUILD != 'true' && github.event_name == 'push'
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/mrolim77/kyaf-ssr.git
          git push gitlab main
